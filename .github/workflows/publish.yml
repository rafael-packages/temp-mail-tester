name: Build, Test and Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run lint checks
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Auto-bump version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore: bump version to %s [skip ci]"
          git push origin main --tags

      - name: Build package
        run: bun run build

      - name: Publish to NPM
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "Error: NPM_TOKEN secret is not set. Skipping publish."
            exit 1
          fi
          
          PACKAGE_NAME=$(jq -r .name package.json)
          PACKAGE_VERSION=$(jq -r .version package.json)
          
          echo "Checking if $PACKAGE_NAME@$PACKAGE_VERSION is already published..."
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" --json >/dev/null 2>&1; then
            echo "Version $PACKAGE_VERSION of $PACKAGE_NAME is already published on NPM. Skipping publish."
          else
            echo "Version $PACKAGE_VERSION of $PACKAGE_NAME is not published. Publishing..."
            npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
            npm publish --access public
          fi
